function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function calcInstallments(priceStr) {
  const val = parseFloat(priceStr.replace('.','').replace(',','.'));
  const inst = (val / 10).toFixed(2).replace('.',',');
  return `em até 10x de R$ ${inst} sem juros`;
}

function render() {
  const id = parseInt(getParam('id')) || 1;
  const p = products[id] || products[1];

  document.title = `${p.name} - IMPERADOR`;
  document.getElementById('main-img').src = p.img;
  document.getElementById('main-img').alt = p.name;

  const badge = document.getElementById('product-badge');
  if (p.badge) {
    badge.textContent = p.badge;
    badge.className = `absolute top-4 left-4 px-sm py-xs font-label-sm uppercase tracking-wider rounded-sm ${p.badgeCls}`;
  } else {
    badge.classList.add('hidden');
  }

  // thumbs — same image repeated as placeholder
  const thumbs = document.getElementById('thumbs');
  thumbs.innerHTML = [p.img, I.drill, I.saw, I.hammer].map((src, i) => `
    <div class="w-20 h-20 border-2 ${i===0?'border-primary':'border-outline-variant hover:border-primary'} flex-shrink-0 cursor-pointer p-2 bg-white thumb-item">
      <img class="w-full h-full object-contain" src="${src}" alt="foto ${i+1}">
    </div>`).join('');

  document.getElementById('product-brand').textContent = `${p.brand} Professional`;
  document.getElementById('product-name').textContent = p.name;
  document.getElementById('review-count').textContent = `4.8 (${p.reviews} avaliações)`;
  document.getElementById('product-price').textContent = `R$ ${p.price}`;
  document.getElementById('installments').textContent = calcInstallments(p.price);

  const oldEl = document.getElementById('product-old-price');
  if (p.oldPrice) {
    oldEl.textContent = `R$ ${p.oldPrice}`;
    oldEl.classList.remove('hidden');
  }

  document.getElementById('product-desc').textContent = p.desc;

  const grid = document.getElementById('specs-grid');
  grid.innerHTML = p.specs.map(s => `
    <div class="border border-outline-variant p-md bg-white">
      <span class="font-label-sm text-outline uppercase block mb-2">${s.l}</span>
      <div class="flex items-baseline gap-1">
        <span class="font-headline-md text-headline-md text-on-surface">${s.v}</span>
        <span class="font-label-md text-secondary">${s.u}</span>
      </div>
    </div>`).join('');

  // Related: 4 random other products
  const others = products.slice(1).filter((_, i) => (i+1) !== id).slice(0, 4);
  const related = document.getElementById('related-grid');
  related.innerHTML = others.map((r, ri) => `
    <div class="border border-outline-variant bg-white group cursor-pointer" onclick="window.location.href='produto.html?id=${products.indexOf(r)}'">
      <div class="aspect-square bg-surface-container-low p-md overflow-hidden">
        <img class="w-full h-full object-contain group-hover:scale-105 transition-transform" src="${r.img}" alt="${r.name}">
      </div>
      <div class="p-base">
        <span class="font-label-sm text-outline uppercase block">${r.brand}</span>
        <p class="font-body-md text-on-surface font-bold truncate">${r.name}</p>
        <p class="font-headline-sm text-headline-sm text-primary mt-2">R$ ${r.price}</p>
      </div>
    </div>`).join('');
}

render();

// Thumb click
document.getElementById('thumbs').addEventListener('click', e => {
  const item = e.target.closest('.thumb-item');
  if (!item) return;
  document.getElementById('main-img').src = item.querySelector('img').src;
  document.querySelectorAll('.thumb-item').forEach(t => {
    t.classList.remove('border-primary');
    t.classList.add('border-outline-variant');
  });
  item.classList.add('border-primary');
  item.classList.remove('border-outline-variant');
});

// CTA press effect
const btn = document.getElementById('btn-cart');
btn.addEventListener('mousedown', () => btn.classList.remove('hard-shadow'));
btn.addEventListener('mouseup', () => btn.classList.add('hard-shadow'));

btn.addEventListener('click', () => {
  const id = parseInt(getParam('id')) || 1;
  Cart.add(id);
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> ADICIONADO!';
  btn.style.background = '#16a34a';
  btn.style.color = '#fff';
  setTimeout(() => {
    btn.innerHTML = orig;
    btn.style.background = '';
    btn.style.color = '';
  }, 1500);
});
</script>
